# Manual deploy to Vercel (avoids failed runs when secrets are not set yet).
# After adding secrets, you can add:  push: { branches: [main, master] }
#
# GitHub → Settings → Secrets → Actions:
#   VERCEL_TOKEN        https://vercel.com/account/tokens
#   VERCEL_ORG_ID       from .vercel/project.json after `npx vercel link`
#   VERCEL_PROJECT_ID   same
#
name: Deploy to Vercel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
